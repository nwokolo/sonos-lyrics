name: Build Standalone Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android-standalone/**'
      - 'public/**'
      - '.github/workflows/android-standalone.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        working-directory: android-standalone
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sonos-lyrics-standalone-debug-apk
          path: android-standalone/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
