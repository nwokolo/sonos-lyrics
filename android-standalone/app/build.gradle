plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.nwokolo.sonoslyrics.standalone'
    compileSdk 34

    defaultConfig {
        applicationId 'com.nwokolo.sonoslyrics.standalone'
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName '1.0'
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

// The self-contained app serves the existing web frontend from assets. Rather
// than duplicating public/, copy it in at build time so there is a single
// source of truth for the UI.
tasks.register('copyWebAssets', Copy) {
    from file("${rootDir}/../public")
    into file("${projectDir}/src/main/assets/www")
}

tasks.named('preBuild') {
    dependsOn 'copyWebAssets'
}

dependencies {
    implementation 'org.nanohttpd:nanohttpd:2.3.1'
}
